<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi 2026 | Adarsh</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Poppins', sans-serif;
}

body{
    height:100vh;
    background: linear-gradient(-45deg,#ff6ec4,#7873f5,#42e695,#f9ca24);
    background-size:400% 400%;
    animation: gradientBG 12s ease infinite;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

@keyframes gradientBG{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
}

.card{
    background: rgba(255,255,255,0.15);
    padding:40px;
    border-radius:25px;
    backdrop-filter: blur(15px);
    text-align:center;
    color:white;
    box-shadow:0 10px 40px rgba(0,0,0,0.3);
    width:90%;
    max-width:400px;
}

h1{
    font-size:38px;
    margin-bottom:10px;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{text-shadow:0 0 10px #fff;}
    to{text-shadow:0 0 25px #ffeb3b;}
}

p{
    margin-bottom:25px;
    font-size:18px;
    opacity:0.9;
}

button{
    padding:12px 28px;
    border:none;
    border-radius:30px;
    background:white;
    color:#ff4081;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

button:hover{
    transform:scale(1.1);
    background:#ff4081;
    color:white;
}

.signature{
    margin-top:25px;
    font-size:16px;
    letter-spacing:1px;
    opacity:0.8;
}

/* Floating Bubbles */
.bubble{
    position:absolute;
    border-radius:50%;
    opacity:0.6;
    animation: float 10s linear infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    100%{transform:translateY(-120vh);}
}
</style>
</head>

<body>

<div class="card">
    <h1>🎨 Happy Holi 2026 🎉</h1>
    <p>Itna maza kyu aa raha hai... 💖</p>
    <button onclick="toggleMusic()">Play Music 🎵</button>
    <div class="signature">Made with ❤️ by Adarsh</div>
</div>

<audio id="bgMusic" src="music.mp3"></audio>

<script>
function toggleMusic(){
    var music = document.getElementById("bgMusic");
    if(music.paused){
        music.play();
    }else{
        music.pause();
    }
}

// Floating Holi Colors
for(let i=0;i<30;i++){
    let bubble = document.createElement("div");
    bubble.classList.add("bubble");
    let size = Math.random()*50 + 20;
    bubble.style.width = size + "px";
    bubble.style.height = size + "px";
    bubble.style.left = Math.random()*100 + "vw";
    bubble.style.bottom = "-100px";
    bubble.style.background = `hsl(${Math.random()*360}, 80%, 60%)`;
    bubble.style.animationDuration = (Math.random()*8 + 5) + "s";
    document.body.appendChild(bubble);
}
</script>

</body>
</html>
