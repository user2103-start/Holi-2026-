<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi 2026</title>

<style>
body{
    margin:0;
    padding:0;
    font-family: 'Segoe UI', sans-serif;
    text-align:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fbc2eb,#a18cd1);
    overflow:hidden;
    color:#fff;
}

h1{
    margin-top:80px;
    font-size:45px;
    letter-spacing:2px;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from {text-shadow:0 0 10px #fff;}
    to {text-shadow:0 0 25px #ffeb3b;}
}

p{
    font-size:20px;
    margin-top:10px;
}

button{
    margin-top:30px;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#ffffff;
    color:#ff4081;
    font-size:18px;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

button:hover{
    background:#ff4081;
    color:white;
    transform:scale(1.1);
}

.footer{
    position:absolute;
    bottom:20px;
    width:100%;
    font-size:18px;
    letter-spacing:1px;
}

/* Floating Colors */
.color{
    position:absolute;
    border-radius:50%;
    opacity:0.6;
    animation: float 8s infinite;
}

@keyframes float{
    0%{transform:translateY(0);}
    100%{transform:translateY(-1000px);}
}
</style>
</head>

<body>

<h1>🎉 Happy Holi 2026 🎨</h1>
<p>Itna maza kyu aa raha hai... 💖</p>

<button onclick="toggleMusic()">Play Music 🎵</button>

<audio id="holiSong" src="holi.mp3"></audio>

<div class="footer">Made with ❤️ by Adarsh</div>

<script>
function toggleMusic(){
    var song = document.getElementById("holiSong");
    if(song.paused){
        song.play();
    }else{
        song.pause();
    }
}

// Create Floating Colors
for(let i=0;i<25;i++){
    let color = document.createElement("div");
    color.classList.add("color");
    color.style.width = Math.random()*40 + 20 + "px";
    color.style.height = color.style.width;
    color.style.left = Math.random()*100 + "vw";
    color.style.top = Math.random()*100 + "vh";
    color.style.background = 
    `hsl(${Math.random()*360}, 80%, 60%)`;
    color.style.animationDuration = 
    (Math.random()*5 + 5) + "s";
    document.body.appendChild(color);
}
</script>

</body>
</html>
