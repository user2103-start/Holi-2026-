<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holi 2026 | Adarsh</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Caveat:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #ff4081; --secondary-color: #7c4dff; }
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0a0a0a; color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden; text-align: center; }
        
        .container { z-index: 10; padding: 30px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8); max-width: 450px; width: 90%; position: relative; }
        
        h1 { font-size: 2.8rem; margin-bottom: 5px; background: linear-gradient(to right, #ff0080, #7928ca, #00dfd8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: hue 4s infinite linear; }
        
        @keyframes hue { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }

        /* Lyrics Styling */
        #lyrics-container { margin: 20px 0; min-height: 60px; font-style: italic; color: #ffeb3b; font-size: 1.2rem; text-shadow: 0 0 10px rgba(255, 235, 59, 0.5); transition: opacity 0.5s ease; opacity: 0; }
        
        .signature { margin-top: 25px; font-family: 'Caveat', cursive; font-size: 2.5rem; color: #00dbde; }
        
        .btn { margin-top: 10px; padding: 15px 35px; border: none; border-radius: 50px; background: linear-gradient(45deg, #f093fb 0%, #f5576c 100%); color: white; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4); }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 6px 20px rgba(245, 87, 108, 0.6); }
    </style>
</head>
<body>

    <audio id="holiSong">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>Happy Holi 2026</h1>
        
        <div id="lyrics-container">Click below to start the vibe!</div>

        <button id="mainBtn" class="btn" onclick="startVibe()">Rang Barsao! 🌈</button>

        <div class="signature">— Adarsh</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        const lyrics = [
            "Itna maza kyu aa raha hai...",
            "Tune hawa mein bhaang milaya! 🎵",
            "Dugna nasha kyu ho raha hai...",
            "Aakhon se meetha tune khilaya! 🍬",
            "Balam pichkari jo tune mujhe maari...",
            "Toh seedhi saadi chhori sharabi ho gayi! 💃"
        ];

        let lyricIndex = 0;

        function startVibe() {
            const audio = document.getElementById('holiSong');
            const lyricBox = document.getElementById('lyrics-container');
            const btn = document.getElementById('mainBtn');
            
            audio.play();
            btn.style.display = 'none'; // Button hide kar diya
            lyricBox.style.opacity = '1';

            // Lyrics cycle
            setInterval(() => {
                lyricBox.style.opacity = '0';
                setTimeout(() => {
                    lyricBox.innerText = lyrics[lyricIndex];
                    lyricBox.style.opacity = '1';
                    lyricIndex = (lyricIndex + 1) % lyrics.length;
                }, 500);
            }, 3000);

            // Endless Confetti
            var end = Date.now() + (30 * 1000);
            (function frame() {
                confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#ff0080', '#ffff00'] });
                confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#00dfd8', '#7928ca'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
    </script>
</body>
</html>
